{% extends "base.html" %}
{% block title %}Verify Identity{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card">
            <div class="card-body p-4 text-center">
                <h3 class="mb-4"><i class="fas fa-shield-alt text-primary"></i> Verify Identity</h3>
                <p class="text-muted">Welcome back, <strong>{{ username }}</strong>!</p>
                <p class="text-muted">Enter the 6-digit code from your authenticator app</p>
                
                <form method="POST" action="{{ url_for('inline_mfa') }}">
                    <div class="mb-3">
                        <input type="text" class="form-control form-control-lg text-center" 
                               name="token" maxlength="6" pattern="[0-9]{6}" 
                               placeholder="000000" required autofocus
                               style="font-size: 2rem; letter-spacing: 0.5rem;">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 btn-lg">
                        <i class="fas fa-unlock"></i> Verify & Continue
                    </button>
                </form>
                
                <hr class="my-4">
                <p class="text-muted small">
                    <i class="fas fa-info-circle"></i> 
                    Open Google Authenticator or your preferred 2FA app to get the code.
                </p>
                <a href="{{ url_for('login') }}" class="btn btn-outline-secondary btn-sm">
                    <i class="fas fa-arrow-left"></i> Back to Login
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
